services:
  mysql-events:
    image: mysql:8.0
    container_name: mysql-events
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-eventdb}
      MYSQL_USER: ${MYSQL_USER:-eventuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-eventpass}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_events_data:/var/lib/mysql
    networks:
      - event-network

  redis:
    image: redis:7-alpine
    container_name: redis-events
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - event-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-shared
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    networks:
      - event-network

  wordpress-db:
    image: mysql:8.0
    container_name: wordpress-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${WP_DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${WP_DB_NAME:-wordpress}
      MYSQL_USER: ${WP_DB_USER:-wpuser}
      MYSQL_PASSWORD: ${WP_DB_PASSWORD:-wppass}
    volumes:
      - wordpress_db_data:/var/lib/mysql
    networks:
      - event-network

  wordpress:
    image: wordpress:latest
    container_name: wordpress
    restart: unless-stopped
    depends_on:
      - wordpress-db
    environment:
      WORDPRESS_DB_HOST: wordpress-db
      WORDPRESS_DB_USER: ${WP_DB_USER:-wpuser}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD:-wppass}
      WORDPRESS_DB_NAME: ${WP_DB_NAME:-wordpress}
      WORDPRESS_TABLE_PREFIX: wp_
    ports:
      - "${WORDPRESS_PORT:-8080}:80"
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - event-network

volumes:
  mysql_events_data:
  wordpress_db_data:
  wordpress_data:

networks:
  event-network:
    driver: bridge
