#Puerto de la aplicacion
server.port=${SERVER_PORT:8081}

#Base de datos MySQL
spring.datasource.url=${DATASOURCE_URL:jdbc:mysql://localhost:3307/eventdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATASOURCE_USERNAME:eventuser}
spring.datasource.password=${DATASOURCE_PASSWORD:eventpass}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# SpringDoc
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# WordPress API (a definir en servicios posteriores)
wordpress.api.base-url=${WORDPRESS_API_URL:https://demo.wp-api.org/wp-json/wp/v2}
